AWSTemplateFormatVersion: "2010-09-09"
Description: Slynk API - Plain CloudFormation stack (no SAM transform)

Parameters:
  Environment:
    Type: String
    Default: prod
  ApiPrefix:
    Type: String
    Default: /api/v1
  CorsOrigins:
    Type: String
    Default: "*"
  PublicBaseUrl:
    Type: String
    Default: ""
  S3Prefix:
    Type: String
    Default: uploads/
  DefaultFileTtlHours:
    Type: Number
    Default: 8
  MaxUploadBytes:
    Type: Number
    Default: 3221225472
  MaxPresignedUrlAge:
    Type: Number
    Default: 3600
  DailyIpCreateLimit:
    Type: Number
    Default: 5
  ExpiryScanSchedule:
    Type: String
    Default: rate(5 minutes)
  LambdaCodeS3Bucket:
    Type: String
    Description: S3 bucket containing the deployment zip for all Lambda functions.
  LambdaCodeS3Key:
    Type: String
    Description: S3 key for the deployment zip containing app code and dependencies.
  LambdaCodeS3ObjectVersion:
    Type: String
    Default: ""
    Description: Optional S3 object version for immutable deployments.

Conditions:
  HasObjectVersion: !Not [!Equals [!Ref LambdaCodeS3ObjectVersion, ""]]

Resources:
  CommunityApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "slynk-api-${Environment}"
      ProtocolType: HTTP

  CommunityApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref CommunityApi
      StageName: v1
      AutoDeploy: true

  CommunityBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CommunityTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl_epoch
        Enabled: true

  DeleteQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 120
      MessageRetentionPeriod: 1209600

  ApiFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ApiFunctionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                Resource: !GetAtt CommunityTable.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "${CommunityBucket.Arn}/*"

  EnqueueFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EnqueueFunctionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource: !GetAtt CommunityTable.Arn
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt DeleteQueue.Arn

  ProcessFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ProcessFunctionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DeleteItem
                Resource: !GetAtt CommunityTable.Arn
              - Effect: Allow
                Action:
                  - s3:DeleteObject
                Resource: !Sub "${CommunityBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - sqs:DeleteMessage
                  - sqs:ReceiveMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt DeleteQueue.Arn

  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "slynk-api-http-${Environment}"
      Role: !GetAtt ApiFunctionRole.Arn
      Runtime: python3.12
      Handler: lambda_http.handler
      Timeout: 30
      MemorySize: 1024
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
        S3ObjectVersion: !If [HasObjectVersion, !Ref LambdaCodeS3ObjectVersion, !Ref AWS::NoValue]
      Environment:
        Variables:
          SLYNK_PROJECT_NAME: Slynk Community API
          SLYNK_ENV: !Ref Environment
          SLYNK_API_PREFIX: !Ref ApiPrefix
          SLYNK_CORS_ORIGINS: !Ref CorsOrigins
          SLYNK_S3_BUCKET: !Ref CommunityBucket
          SLYNK_S3_PREFIX: !Ref S3Prefix
          SLYNK_S3_ENDPOINT_URL: ""
          SLYNK_DYNAMO_COMMUNITY_TABLE: !Ref CommunityTable
          SLYNK_SQS_DELETE_QUEUE_URL: !Ref DeleteQueue
          SLYNK_DEFAULT_FILE_TTL_HOURS: !Ref DefaultFileTtlHours
          SLYNK_MAX_UPLOAD_BYTES: !Ref MaxUploadBytes
          SLYNK_MAX_PRESIGNED_URL_AGE: !Ref MaxPresignedUrlAge
          SLYNK_DAILY_IP_CREATE_LIMIT: !Ref DailyIpCreateLimit
          SLYNK_PUBLIC_BASE_URL: !Ref PublicBaseUrl

  EnqueueExpiredSessionsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "slynk-api-enqueue-expired-${Environment}"
      Role: !GetAtt EnqueueFunctionRole.Arn
      Runtime: python3.12
      Handler: aws_lambda_handlers.enqueue_expired_sessions_handler
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
        S3ObjectVersion: !If [HasObjectVersion, !Ref LambdaCodeS3ObjectVersion, !Ref AWS::NoValue]
      Environment:
        Variables:
          SLYNK_PROJECT_NAME: Slynk Community API
          SLYNK_ENV: !Ref Environment
          SLYNK_API_PREFIX: !Ref ApiPrefix
          SLYNK_CORS_ORIGINS: !Ref CorsOrigins
          SLYNK_S3_BUCKET: !Ref CommunityBucket
          SLYNK_S3_PREFIX: !Ref S3Prefix
          SLYNK_S3_ENDPOINT_URL: ""
          SLYNK_DYNAMO_COMMUNITY_TABLE: !Ref CommunityTable
          SLYNK_SQS_DELETE_QUEUE_URL: !Ref DeleteQueue
          SLYNK_DEFAULT_FILE_TTL_HOURS: !Ref DefaultFileTtlHours
          SLYNK_MAX_UPLOAD_BYTES: !Ref MaxUploadBytes
          SLYNK_MAX_PRESIGNED_URL_AGE: !Ref MaxPresignedUrlAge
          SLYNK_DAILY_IP_CREATE_LIMIT: !Ref DailyIpCreateLimit
          SLYNK_PUBLIC_BASE_URL: !Ref PublicBaseUrl

  ProcessDeleteQueueFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "slynk-api-process-delete-${Environment}"
      Role: !GetAtt ProcessFunctionRole.Arn
      Runtime: python3.12
      Handler: aws_lambda_handlers.process_delete_queue_handler
      Timeout: 120
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
        S3ObjectVersion: !If [HasObjectVersion, !Ref LambdaCodeS3ObjectVersion, !Ref AWS::NoValue]
      Environment:
        Variables:
          SLYNK_PROJECT_NAME: Slynk Community API
          SLYNK_ENV: !Ref Environment
          SLYNK_API_PREFIX: !Ref ApiPrefix
          SLYNK_CORS_ORIGINS: !Ref CorsOrigins
          SLYNK_S3_BUCKET: !Ref CommunityBucket
          SLYNK_S3_PREFIX: !Ref S3Prefix
          SLYNK_S3_ENDPOINT_URL: ""
          SLYNK_DYNAMO_COMMUNITY_TABLE: !Ref CommunityTable
          SLYNK_SQS_DELETE_QUEUE_URL: !Ref DeleteQueue
          SLYNK_DEFAULT_FILE_TTL_HOURS: !Ref DefaultFileTtlHours
          SLYNK_MAX_UPLOAD_BYTES: !Ref MaxUploadBytes
          SLYNK_MAX_PRESIGNED_URL_AGE: !Ref MaxPresignedUrlAge
          SLYNK_DAILY_IP_CREATE_LIMIT: !Ref DailyIpCreateLimit
          SLYNK_PUBLIC_BASE_URL: !Ref PublicBaseUrl

  ApiLambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref CommunityApi
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      PayloadFormatVersion: "2.0"
      IntegrationUri: !Sub >-
        arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations

  ApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref CommunityApi
      RouteKey: $default
      Target: !Join ["", ["integrations/", !Ref ApiLambdaIntegration]]

  ApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CommunityApi}/*/*"

  ExpiryScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "slynk-api-expiry-scan-${Environment}"
      ScheduleExpression: !Ref ExpiryScanSchedule
      State: ENABLED
      Targets:
        - Arn: !GetAtt EnqueueExpiredSessionsFunction.Arn
          Id: EnqueueExpiredSessionsTarget

  EnqueueInvokePermissionFromEvents:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EnqueueExpiredSessionsFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ExpiryScheduleRule.Arn

  DeleteQueueEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 10
      Enabled: true
      EventSourceArn: !GetAtt DeleteQueue.Arn
      FunctionName: !Ref ProcessDeleteQueueFunction

Outputs:
  ApiUrl:
    Description: HTTP API endpoint base URL with stage
    Value: !Sub "${CommunityApi.ApiEndpoint}/v1"
  BucketName:
    Value: !Ref CommunityBucket
  DynamoTableName:
    Value: !Ref CommunityTable
  DeleteQueueUrl:
    Value: !Ref DeleteQueue
  DeleteQueueArn:
    Value: !GetAtt DeleteQueue.Arn
