AWSTemplateFormatVersion: "2010-09-09"
Description: Slynk API - Plain CloudFormation stack (no SAM transform)

Parameters:
  Environment:
    Type: String
    Default: prod
  CorsOrigins:
    Type: String
    Default: "*"
  PublicBaseUrl:
    Type: String
    Default: ""
  S3Prefix:
    Type: String
    Default: uploads/
  DefaultFileTtlHours:
    Type: Number
    Default: 8
  PendingSessionStaleHours:
    Type: Number
    Default: 24
  MaxUploadBytes:
    Type: Number
    Default: 3221225472
  MaxPresignedUrlAge:
    Type: Number
    Default: 3600
  DailyIpCreateLimit:
    Type: Number
    Default: 5
  ExpiryScanIntervalMinutes:
    Type: Number
    Default: 5
    MinValue: 1
  GeoEnrichIntervalMinutes:
    Type: Number
    Default: 15
    MinValue: 1
  GeoEnrichEnabled:
    Type: String
    Default: "true"
  GeoEnrichBatchSize:
    Type: Number
    Default: 25
  AnalyticsApiKey:
    Type: String
    Default: ""
  CloudFrontOriginSecret:
    Type: String
    NoEcho: true
    Description: Shared secret that CloudFront injects to the API origin so direct origin access can be rejected.
  PrivateBearerToken:
    Type: String
    NoEcho: true
    Description: Private bearer token required from the trusted frontend server when calling the API.
  LambdaCodeS3Bucket:
    Type: String
    Description: S3 bucket containing the deployment zip for all Lambda functions.
  LambdaCodeS3Key:
    Type: String
    Description: S3 key for the deployment zip containing app code and dependencies.
  LambdaCodeS3ObjectVersion:
    Type: String
    Default: ""
    Description: Optional S3 object version for immutable deployments.
  ApiCloudFrontPriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_All
      - PriceClass_200
      - PriceClass_100

Conditions:
  HasObjectVersion: !Not [!Equals [!Ref LambdaCodeS3ObjectVersion, ""]]

Resources:
  LiteApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "slynk-api-${Environment}"
      ProtocolType: HTTP

  LiteApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref LiteApi
      StageName: $default
      AutoDeploy: true

  ApiCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: !Ref ApiCloudFrontPriceClass
        Origins:
          - Id: ApiGatewayOrigin
            DomainName: !Select [2, !Split ["/", !GetAtt LiteApi.ApiEndpoint]]
            OriginCustomHeaders:
              - HeaderName: X-Slynk-Origin-Secret
                HeaderValue: !Ref CloudFrontOriginSecret
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              HTTPSPort: 443
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: ApiGatewayOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - PATCH
            - POST
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3

  LiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*"
            AllowedMethods:
              - PUT
              - GET
              - HEAD
            AllowedHeaders:
              - "*"
            ExposedHeaders:
              - ETag
            MaxAge: 3000
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LiteTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl_epoch
        Enabled: true

  StatisticsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: stat_key
          AttributeType: S
      KeySchema:
        - AttributeName: stat_key
          KeyType: HASH

  DeleteQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 120
      MessageRetentionPeriod: 1209600

  ApiFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ApiFunctionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                Resource: !GetAtt LiteTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                Resource: !GetAtt StatisticsTable.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "${LiteBucket.Arn}/*"

  EnqueueFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EnqueueFunctionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource: !GetAtt LiteTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource: !GetAtt StatisticsTable.Arn
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt DeleteQueue.Arn

  ProcessFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ProcessFunctionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DeleteItem
                Resource: !GetAtt LiteTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                Resource: !GetAtt StatisticsTable.Arn
              - Effect: Allow
                Action:
                  - s3:DeleteObject
                Resource: !Sub "${LiteBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - sqs:DeleteMessage
                  - sqs:ReceiveMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt DeleteQueue.Arn

  GeoEnrichFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GeoEnrichFunctionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource: !GetAtt LiteTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt StatisticsTable.Arn

  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "slynk-api-http-${Environment}"
      Role: !GetAtt ApiFunctionRole.Arn
      Runtime: python3.12
      Handler: lambda_http.handler
      Timeout: 30
      MemorySize: 1024
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
        S3ObjectVersion: !If [HasObjectVersion, !Ref LambdaCodeS3ObjectVersion, !Ref AWS::NoValue]
      Environment:
        Variables:
          SLYNK_PROJECT_NAME: Slynk Lite API
          SLYNK_ENV: !Ref Environment
          SLYNK_API_GATEWAY_BASE_PATH: /
          SLYNK_CORS_ORIGINS: !Ref CorsOrigins
          SLYNK_S3_BUCKET: !Ref LiteBucket
          SLYNK_S3_PREFIX: !Ref S3Prefix
          SLYNK_DYNAMO_COMMUNITY_TABLE: !Ref LiteTable
          SLYNK_DYNAMO_STATISTICS_TABLE: !Ref StatisticsTable
          SLYNK_SQS_DELETE_QUEUE_URL: !Ref DeleteQueue
          SLYNK_DEFAULT_FILE_TTL_HOURS: !Ref DefaultFileTtlHours
          SLYNK_PENDING_SESSION_STALE_HOURS: !Ref PendingSessionStaleHours
          SLYNK_MAX_UPLOAD_BYTES: !Ref MaxUploadBytes
          SLYNK_MAX_PRESIGNED_URL_AGE: !Ref MaxPresignedUrlAge
          SLYNK_DAILY_IP_CREATE_LIMIT: !Ref DailyIpCreateLimit
          SLYNK_PUBLIC_BASE_URL: !Ref PublicBaseUrl
          SLYNK_GEO_ENRICH_ENABLED: !Ref GeoEnrichEnabled
          SLYNK_GEO_ENRICH_BATCH_SIZE: !Ref GeoEnrichBatchSize
          SLYNK_GEO_ENRICH_TIMEOUT_SECONDS: 5
          SLYNK_GEO_LOOKUP_PROVIDER: maxmind
          SLYNK_ANALYTICS_API_KEY: !Ref AnalyticsApiKey
          SLYNK_CLOUDFRONT_ORIGIN_SECRET: !Ref CloudFrontOriginSecret
          SLYNK_PRIVATE_BEARER_TOKEN: !Ref PrivateBearerToken

  EnqueueExpiredSessionsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "slynk-api-enqueue-expired-${Environment}"
      Role: !GetAtt EnqueueFunctionRole.Arn
      Runtime: python3.12
      Handler: aws_lambda_handlers.enqueue_expired_sessions_handler
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
        S3ObjectVersion: !If [HasObjectVersion, !Ref LambdaCodeS3ObjectVersion, !Ref AWS::NoValue]
      Environment:
        Variables:
          SLYNK_PROJECT_NAME: Slynk Lite API
          SLYNK_ENV: !Ref Environment
          SLYNK_API_GATEWAY_BASE_PATH: /
          SLYNK_CORS_ORIGINS: !Ref CorsOrigins
          SLYNK_S3_BUCKET: !Ref LiteBucket
          SLYNK_S3_PREFIX: !Ref S3Prefix
          SLYNK_DYNAMO_COMMUNITY_TABLE: !Ref LiteTable
          SLYNK_DYNAMO_STATISTICS_TABLE: !Ref StatisticsTable
          SLYNK_SQS_DELETE_QUEUE_URL: !Ref DeleteQueue
          SLYNK_DEFAULT_FILE_TTL_HOURS: !Ref DefaultFileTtlHours
          SLYNK_PENDING_SESSION_STALE_HOURS: !Ref PendingSessionStaleHours
          SLYNK_MAX_UPLOAD_BYTES: !Ref MaxUploadBytes
          SLYNK_MAX_PRESIGNED_URL_AGE: !Ref MaxPresignedUrlAge
          SLYNK_DAILY_IP_CREATE_LIMIT: !Ref DailyIpCreateLimit
          SLYNK_PUBLIC_BASE_URL: !Ref PublicBaseUrl
          SLYNK_GEO_ENRICH_ENABLED: !Ref GeoEnrichEnabled
          SLYNK_GEO_ENRICH_BATCH_SIZE: !Ref GeoEnrichBatchSize
          SLYNK_GEO_ENRICH_TIMEOUT_SECONDS: 5
          SLYNK_GEO_LOOKUP_PROVIDER: maxmind

  ProcessDeleteQueueFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "slynk-api-process-delete-${Environment}"
      Role: !GetAtt ProcessFunctionRole.Arn
      Runtime: python3.12
      Handler: aws_lambda_handlers.process_delete_queue_handler
      Timeout: 120
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
        S3ObjectVersion: !If [HasObjectVersion, !Ref LambdaCodeS3ObjectVersion, !Ref AWS::NoValue]
      Environment:
        Variables:
          SLYNK_PROJECT_NAME: Slynk Lite API
          SLYNK_ENV: !Ref Environment
          SLYNK_API_GATEWAY_BASE_PATH: /
          SLYNK_CORS_ORIGINS: !Ref CorsOrigins
          SLYNK_S3_BUCKET: !Ref LiteBucket
          SLYNK_S3_PREFIX: !Ref S3Prefix
          SLYNK_DYNAMO_COMMUNITY_TABLE: !Ref LiteTable
          SLYNK_DYNAMO_STATISTICS_TABLE: !Ref StatisticsTable
          SLYNK_SQS_DELETE_QUEUE_URL: !Ref DeleteQueue
          SLYNK_DEFAULT_FILE_TTL_HOURS: !Ref DefaultFileTtlHours
          SLYNK_PENDING_SESSION_STALE_HOURS: !Ref PendingSessionStaleHours
          SLYNK_MAX_UPLOAD_BYTES: !Ref MaxUploadBytes
          SLYNK_MAX_PRESIGNED_URL_AGE: !Ref MaxPresignedUrlAge
          SLYNK_DAILY_IP_CREATE_LIMIT: !Ref DailyIpCreateLimit
          SLYNK_PUBLIC_BASE_URL: !Ref PublicBaseUrl
          SLYNK_GEO_ENRICH_ENABLED: !Ref GeoEnrichEnabled
          SLYNK_GEO_ENRICH_BATCH_SIZE: !Ref GeoEnrichBatchSize
          SLYNK_GEO_ENRICH_TIMEOUT_SECONDS: 5
          SLYNK_GEO_LOOKUP_PROVIDER: maxmind

  EnrichSessionGeolocationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "slynk-api-enrich-geo-${Environment}"
      Role: !GetAtt GeoEnrichFunctionRole.Arn
      Runtime: python3.12
      Handler: aws_lambda_handlers.enrich_session_geolocation_handler
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
        S3ObjectVersion: !If [HasObjectVersion, !Ref LambdaCodeS3ObjectVersion, !Ref AWS::NoValue]
      Environment:
        Variables:
          SLYNK_PROJECT_NAME: Slynk Lite API
          SLYNK_ENV: !Ref Environment
          SLYNK_API_GATEWAY_BASE_PATH: /
          SLYNK_CORS_ORIGINS: !Ref CorsOrigins
          SLYNK_S3_BUCKET: !Ref LiteBucket
          SLYNK_S3_PREFIX: !Ref S3Prefix
          SLYNK_DYNAMO_COMMUNITY_TABLE: !Ref LiteTable
          SLYNK_DYNAMO_STATISTICS_TABLE: !Ref StatisticsTable
          SLYNK_SQS_DELETE_QUEUE_URL: !Ref DeleteQueue
          SLYNK_DEFAULT_FILE_TTL_HOURS: !Ref DefaultFileTtlHours
          SLYNK_PENDING_SESSION_STALE_HOURS: !Ref PendingSessionStaleHours
          SLYNK_MAX_UPLOAD_BYTES: !Ref MaxUploadBytes
          SLYNK_MAX_PRESIGNED_URL_AGE: !Ref MaxPresignedUrlAge
          SLYNK_DAILY_IP_CREATE_LIMIT: !Ref DailyIpCreateLimit
          SLYNK_PUBLIC_BASE_URL: !Ref PublicBaseUrl
          SLYNK_GEO_ENRICH_ENABLED: !Ref GeoEnrichEnabled
          SLYNK_GEO_ENRICH_BATCH_SIZE: !Ref GeoEnrichBatchSize
          SLYNK_GEO_ENRICH_TIMEOUT_SECONDS: 5
          SLYNK_GEO_LOOKUP_PROVIDER: maxmind
          SLYNK_CLOUDFRONT_ORIGIN_SECRET: !Ref CloudFrontOriginSecret

  ApiLambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref LiteApi
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      PayloadFormatVersion: "2.0"
      IntegrationUri: !Sub >-
        arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations

  ApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref LiteApi
      RouteKey: $default
      Target: !Join ["", ["integrations/", !Ref ApiLambdaIntegration]]

  ApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${LiteApi}/*/*"

  ExpiryScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "slynk-api-expiry-scan-${Environment}"
      ScheduleExpression: !Sub "rate(${ExpiryScanIntervalMinutes} minutes)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt EnqueueExpiredSessionsFunction.Arn
          Id: EnqueueExpiredSessionsTarget

  EnqueueInvokePermissionFromEvents:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EnqueueExpiredSessionsFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ExpiryScheduleRule.Arn

  GeoEnrichScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "slynk-api-geo-enrich-${Environment}"
      ScheduleExpression: !Sub "rate(${GeoEnrichIntervalMinutes} minutes)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt EnrichSessionGeolocationFunction.Arn
          Id: EnrichSessionGeolocationTarget

  GeoEnrichInvokePermissionFromEvents:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EnrichSessionGeolocationFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt GeoEnrichScheduleRule.Arn

  DeleteQueueEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 10
      Enabled: true
      EventSourceArn: !GetAtt DeleteQueue.Arn
      FunctionName: !Ref ProcessDeleteQueueFunction

Outputs:
  ApiUrl:
    Description: HTTP API endpoint base URL with stage
    Value: !GetAtt LiteApi.ApiEndpoint
  ApiCloudFrontUrl:
    Description: CloudFront URL in front of the API
    Value: !Sub "https://${ApiCloudFrontDistribution.DomainName}"
  BucketName:
    Value: !Ref LiteBucket
  DynamoTableName:
    Value: !Ref LiteTable
  StatisticsTableName:
    Value: !Ref StatisticsTable
  DeleteQueueUrl:
    Value: !Ref DeleteQueue
  DeleteQueueArn:
    Value: !GetAtt DeleteQueue.Arn
