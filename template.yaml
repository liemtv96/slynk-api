AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Slynk Lite API - FastAPI Lambda + cleanup workers

Parameters:
  Environment:
    Type: String
    Default: prod
  CorsOrigins:
    Type: String
    Default: "*"
  PublicBaseUrl:
    Type: String
    Default: ""
  S3Prefix:
    Type: String
    Default: uploads/
  DefaultFileTtlHours:
    Type: Number
    Default: 8
  MaxUploadBytes:
    Type: Number
    Default: 3221225472
  MaxPresignedUrlAge:
    Type: Number
    Default: 3600
  DailyIpCreateLimit:
    Type: Number
    Default: 5
  ExpiryScanSchedule:
    Type: String
    Default: rate(5 minutes)
  GeoEnrichSchedule:
    Type: String
    Default: rate(15 minutes)
  GeoEnrichEnabled:
    Type: String
    Default: "true"
  GeoEnrichBatchSize:
    Type: Number
    Default: 25
  GeoLookupBaseUrl:
    Type: String
    Default: https://ipapi.co
  GeoLookupToken:
    Type: String
    Default: ""
  AnalyticsApiKey:
    Type: String
    Default: ""
  ApiCloudFrontPriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_All
      - PriceClass_200
      - PriceClass_100

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 512
    Tracing: Active
    Environment:
      Variables:
        SLYNK_PROJECT_NAME: Slynk Lite API
        SLYNK_ENV: !Ref Environment
        SLYNK_API_GATEWAY_BASE_PATH: /
        SLYNK_CORS_ORIGINS: !Ref CorsOrigins
        SLYNK_S3_BUCKET: !Ref LiteBucket
        SLYNK_S3_PREFIX: !Ref S3Prefix
        SLYNK_DYNAMO_COMMUNITY_TABLE: !Ref LiteTable
        SLYNK_SQS_DELETE_QUEUE_URL: !Ref DeleteQueue
        SLYNK_DEFAULT_FILE_TTL_HOURS: !Ref DefaultFileTtlHours
        SLYNK_MAX_UPLOAD_BYTES: !Ref MaxUploadBytes
        SLYNK_MAX_PRESIGNED_URL_AGE: !Ref MaxPresignedUrlAge
        SLYNK_DAILY_IP_CREATE_LIMIT: !Ref DailyIpCreateLimit
        SLYNK_PUBLIC_BASE_URL: !Ref PublicBaseUrl
        SLYNK_GEO_ENRICH_ENABLED: !Ref GeoEnrichEnabled
        SLYNK_GEO_ENRICH_BATCH_SIZE: !Ref GeoEnrichBatchSize
        SLYNK_GEO_ENRICH_TIMEOUT_SECONDS: 5
        SLYNK_GEO_LOOKUP_BASE_URL: !Ref GeoLookupBaseUrl
        SLYNK_GEO_LOOKUP_TOKEN: !Ref GeoLookupToken
        SLYNK_ANALYTICS_API_KEY: !Ref AnalyticsApiKey

Resources:
  LiteApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default

  ApiCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: !Ref ApiCloudFrontPriceClass
        Origins:
          - Id: ApiGatewayOrigin
            DomainName: !Select [2, !Split ["/", !GetAtt LiteApi.ApiEndpoint]]
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              HTTPSPort: 443
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: ApiGatewayOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - PATCH
            - POST
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3

  LiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*"
            AllowedMethods:
              - PUT
              - GET
              - HEAD
            AllowedHeaders:
              - "*"
            ExposedHeaders:
              - ETag
            MaxAge: 3000
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LiteTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl_epoch
        Enabled: true

  DeleteQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 120
      MessageRetentionPeriod: 1209600

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_http.handler
      Timeout: 30
      MemorySize: 1024
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref LiteApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref LiteApi
            Path: /
            Method: ANY
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: DynamoReadWrite
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Scan
              Resource: !GetAtt LiteTable.Arn
            - Sid: S3PresignAccess
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: !Sub "${LiteBucket.Arn}/*"

  EnqueueExpiredSessionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: aws_lambda_handlers.enqueue_expired_sessions_handler
      Events:
        ExpiryScanSchedule:
          Type: Schedule
          Properties:
            Schedule: !Ref ExpiryScanSchedule
            Enabled: true
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: DynamoScanUpdate
              Effect: Allow
              Action:
                - dynamodb:Scan
                - dynamodb:UpdateItem
              Resource: !GetAtt LiteTable.Arn
            - Sid: SendDeleteJobs
              Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt DeleteQueue.Arn

  ProcessDeleteQueueFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: aws_lambda_handlers.process_delete_queue_handler
      Timeout: 120
      Events:
        DeleteQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt DeleteQueue.Arn
            BatchSize: 10
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: DynamoDelete
              Effect: Allow
              Action:
                - dynamodb:DeleteItem
              Resource: !GetAtt LiteTable.Arn
            - Sid: S3Delete
              Effect: Allow
              Action:
                - s3:DeleteObject
              Resource: !Sub "${LiteBucket.Arn}/*"
            - Sid: QueueReceiveDelete
              Effect: Allow
              Action:
                - sqs:DeleteMessage
                - sqs:ReceiveMessage
                - sqs:GetQueueAttributes
              Resource: !GetAtt DeleteQueue.Arn

  EnrichSessionGeolocationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: aws_lambda_handlers.enrich_session_geolocation_handler
      Events:
        GeoEnrichSchedule:
          Type: Schedule
          Properties:
            Schedule: !Ref GeoEnrichSchedule
            Enabled: true
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Sid: DynamoScanUpdateGeo
              Effect: Allow
              Action:
                - dynamodb:Scan
                - dynamodb:UpdateItem
              Resource: !GetAtt LiteTable.Arn

Outputs:
  ApiUrl:
    Description: HTTP API endpoint
    Value: !Sub "https://${LiteApi}.execute-api.${AWS::Region}.amazonaws.com"
  ApiCloudFrontUrl:
    Description: CloudFront URL in front of the API
    Value: !Sub "https://${ApiCloudFrontDistribution.DomainName}"
  BucketName:
    Value: !Ref LiteBucket
  DynamoTableName:
    Value: !Ref LiteTable
  DeleteQueueUrl:
    Value: !Ref DeleteQueue
  DeleteQueueArn:
    Value: !GetAtt DeleteQueue.Arn
